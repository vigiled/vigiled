<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <defs>

    <!-- Fond sombre -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0e16"/>
      <stop offset="100%" stop-color="#060609"/>
    </linearGradient>

    <!-- Gradient LED bar (cyan → bleu) -->
    <linearGradient id="ledBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00c9ff" stop-opacity="0.0"/>
      <stop offset="15%"  stop-color="#00c9ff" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="85%"  stop-color="#00c9ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00c9ff" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Glow de la barre -->
    <linearGradient id="ledGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00c9ff" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#00c9ff" stop-opacity="0.25"/>
      <stop offset="50%"  stop-color="#00c9ff" stop-opacity="0.4"/>
      <stop offset="80%"  stop-color="#00c9ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00c9ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Gradient texte VIGIL -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a0b4cc"/>
    </linearGradient>

    <!-- Gradient texte LED -->
    <linearGradient id="ledTextGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0088bb"/>
    </linearGradient>

    <!-- Glow filter pour l'œil -->
    <filter id="eyeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow fort pour la barre LED -->
    <filter id="barGlow" x="-10%" y="-200%" width="120%" height="500%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow doux pour le texte LED -->
    <filter id="cyanGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip pour arrondir le fond -->
    <clipPath id="bgClip">
      <rect x="0" y="0" width="520" height="200" rx="16" ry="16"/>
    </clipPath>

  </defs>

  <!-- Fond -->
  <rect x="0" y="0" width="520" height="200" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Bordure subtile -->
  <rect x="0.5" y="0.5" width="519" height="199" rx="15.5" ry="15.5"
        fill="none" stroke="#1e2a3a" stroke-width="1"/>

  <!-- Ligne de scan subtile (texture) -->
  <rect x="0" y="0" width="520" height="200" rx="16" ry="16"
        fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>

  <!-- ══════════════════════════════════════ -->
  <!--  ICÔNE : ŒEIL dans un SHIELD         -->
  <!-- ══════════════════════════════════════ -->

  <!-- Shield / badge background -->
  <g transform="translate(42, 34)">
    <!-- Shield shape -->
    <path d="M64 0 L128 24 L128 80 Q128 128 64 148 Q0 128 0 80 L0 24 Z"
          fill="#0d1520" stroke="#1e3050" stroke-width="1.5"
          transform="scale(0.88) translate(-4, 0)"/>

    <!-- Shield inner highlight -->
    <path d="M64 6 L122 28 L122 80 Q122 124 64 142 Q6 124 6 80 L6 28 Z"
          fill="none" stroke="#1e4060" stroke-width="0.8" stroke-opacity="0.6"
          transform="scale(0.88) translate(-4, 0)"/>

    <!-- Œil : forme amande -->
    <g transform="translate(52, 62)" filter="url(#eyeGlow)">
      <!-- Amande extérieure -->
      <path d="M0 0 Q18 -22 36 0 Q18 22 0 0 Z"
            fill="none" stroke="#00c9ff" stroke-width="1.8"/>
      <!-- Iris -->
      <circle cx="18" cy="0" r="10" fill="#001828" stroke="#00a8dd" stroke-width="1.5"/>
      <!-- Pupille -->
      <circle cx="18" cy="0" r="5.5" fill="#00c9ff" fill-opacity="0.15"/>
      <!-- Point brillant -->
      <circle cx="18" cy="0" r="2.8" fill="#00e5ff"/>
      <!-- Reflet -->
      <circle cx="22" cy="-3" r="1.2" fill="#ffffff" fill-opacity="0.9"/>
      <!-- Scan line dans l'iris -->
      <line x1="9" y1="0" x2="27" y2="0" stroke="#00c9ff" stroke-width="0.6" stroke-opacity="0.5"/>
    </g>

    <!-- Barre LED sous l'œil dans le shield -->
    <rect x="30" y="108" width="52" height="3.5" rx="1.75"
          fill="url(#ledBar)" filter="url(#barGlow)" opacity="0.9"
          transform="scale(0.88) translate(-4, 0)"/>
  </g>

  <!-- ══════════════════════════════════════ -->
  <!--  TYPOGRAPHIE                          -->
  <!-- ══════════════════════════════════════ -->

  <!-- VIGI (blanc) -->
  <text x="158" y="102"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-weight="900"
        font-size="68"
        letter-spacing="-1"
        fill="url(#textGrad)">VIGI</text>

  <!-- LED (cyan) — position x absolue : 158 + ~4 lettres×44px + espace 18px = 194 -->
  <text x="382" y="102"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-weight="900"
        font-size="68"
        letter-spacing="-1"
        fill="url(#ledTextGrad)"
        filter="url(#cyanGlow)">LED</text>

  <!-- Tagline -->
  <text x="159" y="126"
        font-family="'Arial', sans-serif"
        font-weight="400"
        font-size="11.5"
        fill="#4a7090"
        letter-spacing="3.2">DASHCAM PROTECTION SIGNAL</text>

  <!-- ══════════════════════════════════════ -->
  <!--  BARRE LED DÉCORATIVE (bas du logo)  -->
  <!-- ══════════════════════════════════════ -->

  <!-- Barre principale -->
  <rect x="158" y="143" width="336" height="4" rx="2"
        fill="url(#ledBar)" filter="url(#barGlow)"/>

  <!-- Halo diffus au dessus -->
  <rect x="158" y="132" width="336" height="26" rx="4"
        fill="url(#ledGlow)" opacity="0.6"/>

  <!-- 9 points LED individuels sur la barre -->
  <g filter="url(#eyeGlow)">
    <circle cx="195" cy="145" r="2.2" fill="#ffffff"/>
    <circle cx="232" cy="145" r="2.2" fill="#00e5ff"/>
    <circle cx="269" cy="145" r="2.2" fill="#ffffff"/>
    <circle cx="306" cy="145" r="2.2" fill="#00e5ff"/>
    <circle cx="343" cy="145" r="2.8" fill="#ffffff"/>
    <circle cx="380" cy="145" r="2.2" fill="#00e5ff"/>
    <circle cx="417" cy="145" r="2.2" fill="#ffffff"/>
    <circle cx="454" cy="145" r="2.2" fill="#00e5ff"/>
    <circle cx="491" cy="145" r="2.2" fill="#ffffff"/>
  </g>

  <!-- Petit badge "v1" discret -->
  <rect x="468" y="16" width="34" height="16" rx="4"
        fill="#0d1f30" stroke="#1a3a54" stroke-width="1"/>
  <text x="485" y="28"
        font-family="'Arial', sans-serif"
        font-size="9"
        fill="#2a6080"
        text-anchor="middle"
        letter-spacing="1">v1.0</text>

</svg>
